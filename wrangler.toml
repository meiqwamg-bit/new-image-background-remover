name = "removebg-worker"
main = "workers/removebg/index.js"
compatibility_date = "2024-01-01"

# KV Namespace for rate limiting
# Create with: wrangler kv:namespace create "RATE_LIMIT_KV"
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_KV_NAMESPACE_ID_HERE"

[vars]
# Set this in Cloudflare dashboard or with wrangler secret
# REMOVE_BG_API_KEY = "your-api-key-here"

# Dev overrides (uncomment for local testing)
# [env.production]
# name = "removebg-worker-prod"
